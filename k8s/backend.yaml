apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2 # 서버 2대를 동시에 돌려 가용성을 높입니다
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: logguard-backend
        image: logguard-backend:latest # 로컬에서 빌드할 이미지 명칭
        imagePullPolicy: Never # 로컬 이미지를 우선 사용하도록 설정
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: "6379"
        # 필요한 환경변수를 여기서 추가로 정의할 수 있습니다.
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort # 외부(내 컴 브라우저)에서 접속하기 위해 LoadBalancer 또는 NodePort 사용
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30080 # 브라우저에서 localhost:30080으로 접속 시도 가능
