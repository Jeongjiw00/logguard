apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-deployment
  labels:
    app: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      containers:
      - name: n8n
        image: n8nio/n8n:latest
        ports:
        - containerPort: 5678
        env:
        - name: N8N_PORT
          value: "5678"
        # 서비스 이름을 통해 들어오는 요청을 허용하기 위한 설정
        - name: WEBHOOK_URL
          value: "http://n8n-service:5678/"
        - name: N8N_ENDPOINT_WEBHOOK
          value: "webhook"
        - name: N8N_ENDPOINT_WEBHOOK_TEST
          value: "webhook-test"
        # 인증 및 권한 이슈 방지 (테스트용)
        - name: N8N_ENCRYPTION_KEY
          value: "logguard-secret-key"

---
apiVersion: v1
kind: Service
metadata:
  name: n8n-service
spec:
  type: NodePort
  selector:
    app: n8n
  ports:
    - protocol: TCP
      port: 5678
      targetPort: 5678
      nodePort: 30567 # 브라우저에서 localhost:30567로 n8n 접속 가능
